version: 0.2

# AWS CodeBuild buildspec for deploying Drupal branch environments
# This file automates the deployment of branch-specific Drupal environments

env:
  variables:
    TF_VERSION: "1.5.0"
    AWS_DEFAULT_REGION: "us-east-1"

phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -q terraform_${TF_VERSION}_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - echo "Pre-build phase started on $(date)"

      # Extract branch name from webhook
      - |
        if [ -z "$BRANCH_NAME" ]; then
          BRANCH_NAME=$(echo $CODEBUILD_WEBHOOK_HEAD_REF | sed 's|refs/heads/||')
        fi
      - echo "Branch Name: $BRANCH_NAME"

      # Sanitize branch name (lowercase, replace special chars)
      - SANITIZED_BRANCH=$(echo $BRANCH_NAME | tr '[:upper:]' '[:lower:]' | tr '_' '-' | sed 's/[^a-z0-9-]//g')
      - echo "Sanitized Branch Name: $SANITIZED_BRANCH"

      # Generate unique listener priority based on branch name hash
      # This ensures each branch gets a unique priority between 100-999
      - PRIORITY=$(echo -n "$SANITIZED_BRANCH" | md5sum | tr -d 'a-z ' | cut -c 1-3)
      - PRIORITY=$((PRIORITY % 900 + 100))  # Range: 100-999
      - echo "Listener Rule Priority: $PRIORITY"

      # Initialize Terraform
      - terraform init -upgrade

  build:
    commands:
      - echo "Build phase started on $(date)"

      # Create Terraform configuration for this branch
      - |
        cat > branch-${SANITIZED_BRANCH}.tf <<EOF
        module "branch_${SANITIZED_BRANCH//-/_}" {
          source = "./modules/branch-environment"

          branch_name                 = "${SANITIZED_BRANCH}"
          project_name                = var.project_name
          ecs_cluster_id              = aws_ecs_cluster.main.id
          ecs_cluster_name            = aws_ecs_cluster.main.name
          vpc_id                      = data.aws_vpc.existing.id
          private_subnet_ids          = local.subnet_ids
          ecs_hosts_security_group_id = aws_security_group.ecs_hosts.id
          alb_arn                     = aws_lb.main.arn
          alb_listener_arn            = var.certificate_arn != "" ? aws_lb_listener.https[0].arn : aws_lb_listener.http.arn
          alb_security_group_id       = aws_security_group.alb.id
          ecs_task_execution_role_arn = aws_iam_role.ecs_task_execution.arn
          ecs_task_role_arn           = aws_iam_role.ecs_task.arn
          aurora_endpoint             = aws_rds_cluster.aurora.endpoint
          aurora_database_name        = aws_rds_cluster.aurora.database_name
          aurora_secret_arn           = aws_secretsmanager_secret.aurora_master_password.arn
          s3_bucket_name              = aws_s3_bucket.drupal_files.id
          domain_suffix               = var.wildcard_domain

          # Branch-specific configuration
          drupal_image   = "drupal:10-apache"
          drupal_cpu     = 512
          drupal_memory  = 1024
          desired_count  = 1

          listener_rule_priority = ${PRIORITY}

          tags = merge(
            var.tags,
            {
              Branch    = "${BRANCH_NAME}"
              CreatedBy = "CodeBuild"
              BuildId   = "${CODEBUILD_BUILD_ID}"
            }
          )
        }

        output "branch_${SANITIZED_BRANCH//-/_}_url" {
          description = "URL for ${BRANCH_NAME} environment"
          value       = module.branch_${SANITIZED_BRANCH//-/_}.url
        }

        output "branch_${SANITIZED_BRANCH//-/_}_service" {
          description = "ECS service name for ${BRANCH_NAME}"
          value       = module.branch_${SANITIZED_BRANCH//-/_}.service_name
        }
        EOF

      - echo "Generated Terraform configuration:"
      - cat branch-${SANITIZED_BRANCH}.tf

      # Plan the changes
      - terraform plan -out=tfplan

      # Apply the changes
      - terraform apply -auto-approve tfplan

      # Get outputs
      - terraform output -json > outputs.json

  post_build:
    commands:
      - echo "Post-build phase started on $(date)"

      # Extract branch URL from outputs
      - |
        BRANCH_URL=$(terraform output -raw branch_${SANITIZED_BRANCH//-/_}_url 2>/dev/null || echo "Not available")
        echo "Branch Environment URL: $BRANCH_URL"

      # Save URL to SSM Parameter Store for easy retrieval
      - |
        if [ "$BRANCH_URL" != "Not available" ]; then
          aws ssm put-parameter \
            --name "/drupal-dynamic/branches/${SANITIZED_BRANCH}/url" \
            --value "$BRANCH_URL" \
            --type String \
            --overwrite
        fi

      # Print summary
      - echo "=========================================="
      - echo "Deployment Summary"
      - echo "=========================================="
      - echo "Branch: $BRANCH_NAME"
      - echo "Sanitized: $SANITIZED_BRANCH"
      - echo "URL: $BRANCH_URL"
      - echo "Priority: $PRIORITY"
      - echo "Build ID: $CODEBUILD_BUILD_ID"
      - echo "=========================================="

      # Output to CodeBuild
      - |
        if [ "$BRANCH_URL" != "Not available" ]; then
          echo "✓ Environment deployed successfully!"
          echo "  Access your Drupal site at: $BRANCH_URL"
        else
          echo "✗ Failed to retrieve environment URL"
          exit 1
        fi

artifacts:
  files:
    - outputs.json
    - branch-*.tf

cache:
  paths:
    - '.terraform/**/*'
